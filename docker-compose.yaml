version: '3.8'

services:
  # ── Node.js API Server ──────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transit_server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - transit_net

  # ── Redis Cache ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: transit_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 600M
    networks:
      - transit_net

networks:
  transit_net:
    driver: bridge

volumes:
  redis_data: