jenkins:
  numExecutors: 2
  nodes:
    - permanent:
        name: "worker-node-1"

# ── SonarQube server is configured by setup-jenkins.sh ───────

# ── Tool auto-installers ─────────────────────────────────────
tool:
  sonarRunnerInstallation:
    installations:
      - name: "SonarScanner"
        home: ""
        properties:
          - installSource:
              installers:
                - sonarRunnerInstaller:
                    id: "6.2.1.4610"
  nodejs:
    installations:
      - name: "NodeJS-22"
        home: ""
        properties:
          - installSource:
              installers:
                - nodeJSInstaller:
                    id: "22.14.0"
                    npmPackagesRefreshHours: 72

# ── Credentials are managed automatically by init.groovy.d ───
# The SonarQube token is fetched from sonarqube-server:9000 at boot.
