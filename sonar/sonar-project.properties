# ── SonarQube Scanner Configuration ──────────────────────────
# Picked up automatically by sonar-scanner when run from the repo root.

sonar.projectKey=project2-node-sever
sonar.projectName=Project2 - Node Server
sonar.projectVersion=1.0.0

# ── Source & Test paths (relative to repo root) ──────────────
sonar.sources=node_sever/src
sonar.tests=node_sever/tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# ── Coverage (Jest lcov output) ──────────────────────────────
sonar.javascript.lcov.reportPaths=node_sever/coverage/lcov.info

# ── Exclusions ───────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  node_sever/data/**,\
  node_sever/coverage/**,\
  node_sever/scripts/**

# ── Encoding ─────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── SonarQube server (overridden by withSonarQubeEnv in Jenkins) ─
sonar.host.url=http://sonarqube-server:9000
